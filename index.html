<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jose Carrizo e Hijos – Tu Piletero de Confianza</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-deep: #020d1f;
    --blue-dark: #041428;
    --blue-mid: #0a2a50;
    --blue-primary: #0d4a8f;
    --blue-bright: #1565d8;
    --blue-neon: #2196f3;
    --blue-glow: #4fc3f7;
    --cyan-glow: #00e5ff;
    --white: #ffffff;
    --text-muted: rgba(255,255,255,0.65);
    --gold: #ffd700;
    --green: #00e676;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--blue-deep);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* BACKGROUND */
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(13,74,143,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(13,74,143,0.12) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0; pointer-events: none;
  }
  .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.15; animation: orbFloat 20s ease-in-out infinite; }
  .orb-1 { width: 500px; height: 500px; background: var(--blue-bright); top: -150px; right: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: var(--cyan-glow); bottom: -100px; left: -100px; animation-delay: -8s; }
  .orb-3 { width: 300px; height: 300px; background: var(--blue-neon); top: 50%; left: 40%; animation-delay: -15s; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(25px,-25px) scale(1.05); }
    66% { transform: translate(-15px,15px) scale(0.95); }
  }

  /* CARD */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 48px 28px 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* LOGO */
  .logo-wrap {
    margin-bottom: 20px;
    animation: fadeInDown 0.8s ease both;
    position: relative;
  }
  .logo-wrap::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
  }
  .logo-img {
    width: 200px;
    filter: drop-shadow(0 0 24px rgba(33,150,243,0.5));
  }

  /* NAME */
  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    background: linear-gradient(180deg, #fff 0%, #90caf9 60%, var(--blue-bright) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 16px rgba(33,150,243,0.4));
    margin-top: 20px;
    margin-bottom: 6px;
    letter-spacing: 2px;
    animation: fadeInUp 0.9s ease 0.1s both;
  }

  .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--blue-glow);
    margin-bottom: 40px;
    animation: fadeInUp 0.9s ease 0.2s both;
  }

  /* BUTTONS */
  .btn-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    width: 100%;
    padding: 18px 24px;
    border-radius: 14px;
    border: 1px solid rgba(79,195,247,0.2);
    background: linear-gradient(135deg, rgba(10,42,80,0.7), rgba(4,20,40,0.8));
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(21,101,216,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn:hover::before { opacity: 1; }
  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    transition: left 0.5s ease;
  }
  .btn:hover::after { left: 150%; }
  .btn:hover {
    border-color: rgba(79,195,247,0.45);
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 32px rgba(21,101,216,0.3), 0 0 0 1px rgba(79,195,247,0.1);
  }
  .btn:active { transform: scale(0.98); }

  .btn-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .btn-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .btn-arrow {
    color: var(--blue-glow);
    opacity: 0.7;
    transition: opacity 0.3s, transform 0.3s;
    flex-shrink: 0;
  }
  .btn:hover .btn-arrow { opacity: 1; transform: translateX(3px); }

  /* Button color variants */
  .btn-whatsapp .btn-icon { background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.2); }
  .btn-whatsapp { border-color: rgba(0,230,118,0.2); }
  .btn-whatsapp:hover { border-color: rgba(0,230,118,0.45); box-shadow: 0 8px 32px rgba(0,230,118,0.15); }
  .btn-whatsapp .btn-arrow { color: var(--green); }

  .btn-pasos .btn-icon { background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.2); }

  .btn-recuperacion .btn-icon { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); }
  .btn-recuperacion { border-color: rgba(0,229,255,0.2); }
  .btn-recuperacion:hover { border-color: rgba(0,229,255,0.45); box-shadow: 0 8px 32px rgba(0,229,255,0.15); }
  .btn-recuperacion .btn-arrow { color: var(--cyan-glow); }

  .btn-combo .btn-icon { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.2); }
  .btn-combo { border-color: rgba(255,215,0,0.2); }
  .btn-combo:hover { border-color: rgba(255,215,0,0.45); box-shadow: 0 8px 32px rgba(255,215,0,0.12); }
  .btn-combo .btn-arrow { color: var(--gold); }

  /* Staggered animation */
  .btn:nth-child(1) { animation: fadeInUp 0.7s ease 0.3s both; }
  .btn:nth-child(2) { animation: fadeInUp 0.7s ease 0.42s both; }
  .btn:nth-child(3) { animation: fadeInUp 0.7s ease 0.54s both; }
  .btn:nth-child(4) { animation: fadeInUp 0.7s ease 0.66s both; }

  /* FOOTER */
  .footer-text {
    margin-top: 36px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    animation: fadeIn 1s ease 0.8s both;
  }
  .footer-text span { color: rgba(79,195,247,0.4); }

  /* ANIMATIONS */
  @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  @media (max-width: 500px) {
    .card { padding: 40px 20px 44px; }
    .logo-img { width: 160px; }
    .name { font-size: 30px; }
    .btn { font-size: 16px; padding: 16px 20px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="card">

  <!-- LOGO -->
  <div class="logo-wrap">
    <!--
      Subí tu logo al repositorio con el nombre 887D2479-5555-451D-99E9-E25BA90806A2.png
      o reemplazá el src con el nombre que tenga tu archivo
    -->
    <img class="logo-img" src="887D2479-5555-451D-99E9-E25BA90806A2.png" alt="Jose Carrizo e Hijos">
  </div>

  <div class="name">Jose Carrizo e Hijos</div>
  <div class="tagline">Tu Piletero de Confianza</div>

  <!-- BOTONES -->
  <div class="btn-list">

    <!-- BOTÓN 1: WhatsApp -->
    <!-- Reemplazá el href con tu número: https://wa.me/549TUNUMERO -->
    <a href="#" class="btn btn-whatsapp">
      <div class="btn-left">
        <div class="btn-icon">💬</div>
        Hablar por WhatsApp
      </div>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

    <!-- BOTÓN 2: Los 12 Pasos -->
    <!-- Reemplazá el href con el link de tu GitHub Pages de la guía -->
    <a href="#" class="btn btn-pasos">
      <div class="btn-left">
        <div class="btn-icon">📋</div>
        Los 12 Pasos del Piletero
      </div>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

    <!-- BOTÓN 3: Recuperación del Agua -->
    <!-- Reemplazá el href con el link correspondiente -->
    <a href="#" class="btn btn-recuperacion">
      <div class="btn-left">
        <div class="btn-icon">💧</div>
        Recuperación del Agua
      </div>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

    <!-- BOTÓN 4: Combo Piletero -->
    <!-- Reemplazá el href con el link correspondiente -->
    <a href="#" class="btn btn-combo">
      <div class="btn-left">
        <div class="btn-icon">⭐</div>
        Combo Piletero
      </div>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

  </div>

  <div class="footer-text">© 2025 <span>Jose Carrizo e Hijos</span></div>

</div>

</body>
</html>
